<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>RRP ENTERPRISES</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{ --navy-dark:#0a172e;--navy:#0d2445;--gold:#00A2E8;--gold-light:#33C2FF; --white:#fff;--gray:#8ba3c6;--green:#1a9e5c;--red:#e03e3e; --border:rgba(0,162,232,0.2); }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy-dark);min-height:100vh;color:var(--white);overflow-x:hidden;}
header{background:linear-gradient(135deg,#0a172e,#0d2445);border-bottom:2px solid var(--gold);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#fff;}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;line-height:1.1;}
.logo-text small{display:block;font-size:10px;font-weight:500;color:var(--gold);letter-spacing:2px;}
.live-pill{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;display:flex;align-items:center;gap:4px;}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.container{max-width:820px;margin:0 auto;padding:16px 12px 60px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:rgba(13,36,69,.4);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center;}
.stat-n{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1;}
.stat-l{font-size:10px;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gold),transparent);}
.card{background:linear-gradient(160deg,rgba(13,36,69,.4),rgba(10,23,46,.7));border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
label{font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);display:block;margin-bottom:5px;}
input,select,textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 11px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s;width:100%;-webkit-appearance:none;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.22);}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:rgba(0,162,232,.07);box-shadow:0 0 0 3px rgba(0,162,232,.1);}
select option{background:#0a172e;color:#fff;}
textarea{resize:none;height:60px;}
.fg{margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--gray);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;user-select:none;}
.chip.sel{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700;}
.chip-lbl{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:6px;}
.load-entries{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.load-entry{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.entry-num{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.entry-del{background:none;border:none;color:rgba(255,80,80,.5);cursor:pointer;font-size:20px;line-height:1;padding:0 2px;transition:color .2s;}
.entry-del:hover{color:var(--red);}
.route-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end;margin-bottom:12px;}
.arrow{color:var(--gold);font-size:20px;font-weight:700;text-align:center;padding-bottom:9px;}
.add-entry-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px dashed rgba(0,162,232,.4);border-radius:8px;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;background:transparent;width:100%;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:all .2s;}
.add-entry-btn:hover{background:rgba(0,162,232,.08);border-color:var(--gold);}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;padding:11px 14px;}
.btn:hover{transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;}
.btn-gold:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--gray);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-outline{background:rgba(0,162,232,.1);border:1px solid rgba(0,162,232,.3);color:var(--gold);}
.btn-sm{padding:8px 12px;font-size:12px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.prev-box{background:#040c17;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;font-size:13px;line-height:1.9;color:#b8ccec;white-space:pre-wrap;min-height:100px;position:relative;font-family:'DM Sans',sans-serif;}
.prev-ph{color:rgba(255,255,255,.18);font-style:italic;}
.copy-float{position:absolute;top:10px;right:10px;background:rgba(0,162,232,.12);border:1px solid rgba(0,162,232,.3);color:var(--gold);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.copy-float:hover{background:rgba(0,162,232,.25);}
.grp-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.grp-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 12px;}
.grp-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;}
.grp-name{flex:1;font-size:13px;font-weight:500;}
.grp-num{font-size:11px;color:var(--gray);}
.grp-del{background:none;border:none;color:rgba(255,80,80,.5);cursor:pointer;font-size:16px;padding:0 3px;transition:color .2s;}
.grp-del:hover{color:var(--red);}
.add-grp-row{display:flex;gap:8px;flex-wrap:wrap;}
.add-grp-row input{flex:1;min-width:120px;}
.bcast-info{font-size:12px;color:var(--gray);margin:10px 0 8px;}
.bcast-info span{color:var(--gold);font-weight:600;}
.btn-bcast{width:100%;padding:14px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#25D366,#1da851);color:#fff;}
.btn-bcast:hover{filter:brightness(1.08);}
.btn-bcast:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.hist-item{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:11px;transition:border-color .2s;animation:fadeIn .3s ease;}
.hist-item:hover{border-color:rgba(0,162,232,.3);}
.hist-icon{width:36px;height:36px;background:rgba(0,162,232,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-route{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-route em{color:var(--gold);font-style:normal;}
.hist-meta{font-size:11px;color:var(--gray);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;}
.tag{background:rgba(13,36,69,.8);border:1px solid rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:10px;color:#90a8c8;}
.hist-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.hist-time{font-size:10px;color:rgba(255,255,255,.25);text-align:right;}
.mb{padding:5px 9px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.mb-wa{background:rgba(37,211,102,.12);color:#25D366;border:1px solid rgba(37,211,102,.2);}
.mb-wa:hover{background:rgba(37,211,102,.22);}
.mb-del{background:rgba(192,57,43,.1);color:#e74c3c;border:1px solid rgba(192,57,43,.18);}
.mb-del:hover{background:rgba(192,57,43,.22);}
.empty{text-align:center;padding:24px;color:rgba(255,255,255,.2);}
.empty-icon{font-size:30px;margin-bottom:5px;}
.empty-txt{font-size:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);border:1px solid var(--gold);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.divider{height:1px;background:rgba(255,255,255,.07);margin:14px 0;}
.miss-note{font-size:11px;color:rgba(0,162,232,.7);margin-top:6px;padding:6px 10px;background:rgba(0,162,232,.07);border-radius:6px;display:none;}
.miss-note.show{display:block;}
@media(max-width:480px){
.route-row{grid-template-columns:1fr;gap:6px;}
.arrow{padding-bottom:0;text-align:left;}
.btn-row{flex-direction:column;}
.add-grp-row{flex-direction:column;}
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://i.img.it.com/R9tD6GPw/logo.png.jpg" alt="RRP Logo" class="logo-mark">
        <div class="logo-text">ENTERPRISES<small>LOAD BOARD</small></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">

        <div class="fg">

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// PWA SERVICE WORKER + MANIFEST (INLINE — works on any host)
// ══════════════════════════════════════════════════════════════
(function initPWA() {

    // 1. Inject Web App Manifest via Blob URL
    const manifest = {
        "name": "RRP ENTERPRISES – Load Board",
        "short_name": "RRP Loads",
        "description": "RRP Enterprises Load Posting & WhatsApp Broadcast Tool",
        "start_url": "./",
        "scope": "./",
        "display": "standalone",
        "orientation": "portrait",
        "background_color": "#0d1f3c",
        "theme_color": "#1B3A6B",
        "icons": [
            {
                "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%2300A2E8'/%3E%3Ctext x='96' y='112' font-size='72' font-family='Arial Black,sans-serif' font-weight='900' fill='%230d1f3c' text-anchor='middle'%3ERRP%3C/text%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml",
                "purpose": "any"
            },
            {
                "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='64' fill='%2300A2E8'/%3E%3Ctext x='256' y='300' font-size='192' font-family='Arial Black,sans-serif' font-weight='900' fill='%230d1f3c' text-anchor='middle'%3ERRP%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
            }
        ]
    };

    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
    const mURL = URL.createObjectURL(blob);
    const mLink = document.createElement('link');
    mLink.rel = 'manifest';
    mLink.href = mURL;
    document.head.appendChild(mLink);

    // 2. Register Inline Service Worker for offline + install prompt
    if ('serviceWorker' in navigator) {
        const swCode = `
const CACHE = 'rrp-v1';
self.addEventListener('install', e => {
    self.skipWaiting();
    e.waitUntil(
        caches.open(CACHE).then(c => c.addAll([
            self.location.pathname
        ]).catch(()=>{}))
    );
});
self.addEventListener('activate', e => {
    e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
    if (e.request.method !== 'GET') return;
    e.respondWith(
        fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
        }).catch(() => caches.match(e.request))
    );
});
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL, {scope: './'})
            .then(() => console.log('✅ RRP SW registered'))
            .catch(e => console.warn('SW reg failed:', e));
    }

    // 3. Capture install prompt for manual "Install App" button
    window._deferredInstall = null;
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        window._deferredInstall = e;
        const btn = document.getElementById('installBtn');
        if (btn) btn.style.display = 'flex';
    });
    window.addEventListener('appinstalled', () => {
        const btn = document.getElementById('installBtn');
        if (btn) btn.style.display = 'none';
        window._deferredInstall = null;
    });
})();

function triggerInstall() {
    if (window._deferredInstall) {
        window._deferredInstall.prompt();
        window._deferredInstall.userChoice.then(r => {
            if (r.outcome === 'accepted') toast('✅ App installed!');
            window._deferredInstall = null;
        });
    } else {
        toast('ℹ️ Open in Chrome → Menu → Add to Home Screen');
    }
}

// ══════════════════════════════════════════════════════════════
// ROBUST COPY FUNCTION - Works offline on Android local files
// ══════════════════════════════════════════════════════════════
function fallbackCopyTextToClipboard(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    
    // Avoid scrolling to bottom
    textArea.style.top = "0";
    textArea.style.left = "0";
    textArea.style.position = "fixed";

    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    try {
        const successful = document.execCommand('copy');
        if(successful) toast('📋 Copied!');
        else toast('⚠️ Copy failed');
    } catch (err) {
        console.error('Fallback: Oops, unable to copy', err);
        toast('⚠️ Copy failed');
    }

    document.body.removeChild(textArea);
}

function copyTextToClipboard(text) {
    if (!navigator.clipboard || !window.isSecureContext) {
        fallbackCopyTextToClipboard(text);
        return;
    }
    navigator.clipboard.writeText(text).then(function() {
        toast('📋 Copied!');
    }, function(err) {
        console.error('Async: Could not copy text: ', err);
        fallbackCopyTextToClipboard(text);
    });
}

// UPGRADED LOOKUP LOGIC
// ══════════════════════════════════════════════════════════════
const apiCache = {};

function getDictEntry(key) {
    if (!key) return null;
    if (D[key]) return D[key];
    if (key.endsWith('s') && D[key.slice(0, -1)]) return D[key.slice(0, -1)];
    return null;
}

async function translateViaAPI(text, lang) {
    const ckey = text.toLowerCase()+'|'+lang;
    if (apiCache[ckey]) return apiCache[ckey];
    
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text.toLowerCase())}`;
        const res = await fetch(url);
        const json = await res.json();
        const tr = json[0][0][0];
        
        if (tr) {
            apiCache[ckey] = tr; 
            return tr;
        }
    } catch(e) { console.error("Translation error:", e); }
    return text;
}

function lookup(text, lang) {
    if (!text || lang === 'en') return text;
    const t = text.trim();
    const key = t.toLowerCase();

    const full = getDictEntry(key);
    if (full && full[lang]) return full[lang];

    const ckey = key + '|' + lang;
    if (apiCache[ckey]) return apiCache[ckey];

    const tokens = t.split(/(\s+|[(),\/\-]+)/);
    let changed = false;
    
    const out = tokens.map(tok => {
        const tkey = tok.toLowerCase().trim();
        if (!tkey) return tok;

        const entry = getDictEntry(tkey);
        if (entry && entry[lang]) {
            changed = true;
            return entry[lang];
        }

        const tckey = tkey + '|' + lang;
        if (apiCache[tckey]) {
            changed = true;
            return apiCache[tckey];
        }

        return tok; 
    });

    return changed ? out.join('') : text;
}

async function preTranslate(wordList, langs) {
    const needed = new Set();
    
    wordList.forEach(w => {
        if(!w) return;
        const t = w.trim();
        const key = t.toLowerCase();
        
        langs.forEach(lang => {
            if (lang === 'en') return;
            if (getDictEntry(key)) return; 
            
            const ckey = key + '|' + lang;
            let allTokensFound = true;
            const tokens = t.split(/(\s+|[(),\/\-]+)/);
            
            tokens.forEach(tok => {
                const tkey = tok.toLowerCase().trim();
                if (!tkey) return;
                if (getDictEntry(tkey)) return; 
                
                const tckey = tkey + '|' + lang;
                if (!apiCache[tckey]) {
                    allTokensFound = false;
                    needed.add(JSON.stringify({w: tok.trim(), lang})); 
                }
            });
            
            if (!allTokensFound && !apiCache[ckey]) {
                needed.add(JSON.stringify({w: t, lang}));
            }
        });
    });
    
    const tasks = Array.from(needed).map(item => {
        const {w, lang} = JSON.parse(item);
        return translateViaAPI(w, lang);
    });
    
    if (tasks.length) await Promise.all(tasks);
}

function buildMessage() {
    const valid = entries.filter(e=>e.from&&e.to);
    if(!valid.length) return '';
    
    const contacts = document.getElementById('contact').value.split('|');
    const waLink = document.getElementById('waLink').value.trim();
    const remarks = document.getElementById('remarks').value.trim();
    const nonEng = [...activeLangs].filter(l=>l!=='en');
    const missing = new Set();
    const lines = [];
    
    lines.push('*RRP ENTERPRISES* 🚚\n');
    
    valid.forEach((e,i)=>{
        const fromEN = e.from.trim();
        const toEN = e.to.trim();
        lines.push(CONNECTORS.en(fromEN.toUpperCase(), toEN.toUpperCase()));
        
        nonEng.forEach(lang=>{
            const fromTr = lookup(fromEN, lang);
            const toTr = lookup(toEN, lang);
            if(fromTr.toLowerCase()===fromEN.toLowerCase()) missing.add(fromEN);
            if(toTr.toLowerCase()===toEN.toLowerCase()) missing.add(toEN);
            lines.push(CONNECTORS[lang](fromTr, toTr));
        });
        
        if(e.tons.length) lines.push('⚖️ ' + e.tons.join(',')+' TONES');
        if(e.tyres.length) lines.push('🛞 ' + e.tyres.map(t=>t.replace(/\s*tyre/i,'')).join(',')+' TYRE');
        if(e.material){
            lines.push('📦 ' + e.material.toUpperCase());
            nonEng.forEach(lang=>{
                const mat = lookup(e.material, lang);
                if(mat && mat.toLowerCase()!==e.material.toLowerCase()) lines.push('📦 ' + mat);
                else if(mat.toLowerCase()===e.material.toLowerCase()) missing.add(e.material);
            });
        }
        if(i<valid.length-1) lines.push('');
    });
    
    lines.push('\n*RRP ENTERPRISES*');
    if(contacts[0]) lines.push('📞 ' + contacts[0]);
    if(contacts[1]) lines.push('📞 ' + contacts[1]);
    
    if(waLink){lines.push('');lines.push(waLink);}
    if(remarks){lines.push('');lines.push(remarks.toUpperCase());}
    
    const note = document.getElementById('missNote');
    if(note){
        const missArr = [...missing].filter(w=>w.trim());
        if(missArr.length && nonEng.length){
            note.textContent = `ℹ️ Translating: ${missArr.join(', ')}`;
            note.classList.add('show');
        } else {
            note.classList.remove('show');
        }
    }
    return lines.join('\n');
}

let previewTimer = null;
async function updatePreview() {
    const box = document.getElementById('prevBox');
    const valid = entries.filter(e=>e.from&&e.to);
    
    if(!valid.length){
        box.innerHTML=`<span class="prev-ph">Fill the form above to preview your WhatsApp message...</span>`;
        return;
    }
    
    const words = [];
    valid.forEach(e=>{
        if(e.from) words.push(e.from.trim());
        if(e.to) words.push(e.to.trim());
        if(e.material) words.push(e.material.trim());
    });
    
    const nonEng = [...activeLangs].filter(l=>l!=='en');
    box.textContent = buildMessage();
    
    const btn = document.createElement('button');
    btn.className='copy-float'; btn.textContent='Copy';
    btn.onclick = () => copyTextToClipboard(buildMessage()); 
    box.appendChild(btn);
    
    if(nonEng.length){
        clearTimeout(previewTimer);
        previewTimer = setTimeout(async ()=>{
            await preTranslate(words, nonEng);
            box.textContent = buildMessage();
            const btn2 = document.createElement('button');
            btn2.className='copy-float'; btn2.textContent='Copy';
            btn2.onclick = () => copyTextToClipboard(buildMessage()); 
            box.appendChild(btn2);
        }, 600);
    }
}

function toggleLang(btn) {

    if(activeLangs.has(lang)&&activeLangs.size>1){activeLangs.delete(lang);btn.classList.remove('sel');}

    updatePreview();
}

        <div class="hist-acts"><div class="hist-time">${b.time}</div>
        <button class="mb mb-wa" onclick="sendBoard(${b.id})">📲 Send</button>
        <button class="mb mb-del" onclick="deleteBoard(${b.id})">✕ Del</button>
        </div></div>`;}).join('');
}

function saveGroups(){localStorage.setItem('rrp_groups_v7',JSON.stringify(groups));}

function renderGroups(){
    const n=groups.filter(g=>g.sel).length;
    document.getElementById('selCount').textContent=n;
    document.getElementById('bcastBtn').disabled=n===0;
    const wrap=document.getElementById('grpList');
    if(!groups.length){wrap.innerHTML=`<div style="color:rgba(255,255,255,.25);font-size:12px;padding:6px 0;">No groups yet.</div>`;return;}
    wrap.innerHTML=groups.map(g=>`<div class="grp-item">
    <input type="checkbox" ${g.sel?'checked':''} onchange="toggleGrp(${g.id},this.checked)">
    <div style="flex:1"><div class="grp-name">${g.name}</div><div class="grp-num">+${g.num} ${g.link ? '<span style="color:var(--gold);font-weight:bold;margin-left:5px;">🔗 Attached</span>' : ''}</div></div>
    <button class="grp-del" onclick="delGrp(${g.id})">✕</button></div>`).join('');
}

function toggleGrp(id,val){const g=groups.find(x=>x.id===id);if(g)g.sel=val;saveGroups();renderGroups();}

function addGroup(){
    const name=document.getElementById('newGrpName').value.trim();
    const num=document.getElementById('newGrpNum').value.trim().replace(/\D/g,'');
    const link=document.getElementById('newGrpLink').value.trim();
    if(!name||!num){toast('⚠️ Enter group name and number');return;}
    groups.push({id:Date.now(),name,num,link,sel:true});
    saveGroups();renderGroups();
    document.getElementById('newGrpName').value=''; document.getElementById('newGrpNum').value=''; document.getElementById('newGrpLink').value='';
    toast('✅ Group added');
}

function delGrp(id){groups=groups.filter(g=>g.id!==id);saveGroups();renderGroups();toast('🗑️ Removed');}

let bQ=[],bI=0;
function startBroadcast(){
    if(!entries.filter(e=>e.from&&e.to).length){toast('⚠️ Add at least one load first');return;}
    bQ=groups.filter(g=>g.sel);
    if(!bQ.length){toast('⚠️ Select at least one group');return;}
    bI=0; sendNext();
}

function sendNext(){
    if(bI>=bQ.length){waCount+=bQ.length;localStorage.setItem('rrp_wa_v7',waCount);updateStats();toast(`✅ Sent to ${bQ.length} group(s)`);return;}
    const g=bQ[bI];
    const waLinkInput = document.getElementById('waLink');
    const originalWaLink = waLinkInput.value;
    if (g.link) waLinkInput.value = g.link;
    const msg = buildMessage();
    waLinkInput.value = originalWaLink;
    window.open(`https://wa.me/${g.num}?text=${encodeURIComponent(msg)}`,'_blank');
    bI++;
    if(bI<bQ.length){toast(`📲 Opening ${g.name}... (${bI}/${bQ.length})`);setTimeout(sendNext,1800);}
    else{waCount+=bQ.length;localStorage.setItem('rrp_wa_v7',waCount);updateStats();toast(`✅ All ${bQ.length} groups opened`);}
}

function clearAll(){entries=[];entryCount=0;document.getElementById('remarks').value='';document.getElementById('waLink').value='';renderEntries();updatePreview();}
function updateStats(){const today=new Date().toLocaleDateString('en-IN');document.getElementById('stat-today').textContent=boards.filter(b=>b.date===today).length;document.getElementById('stat-total').textContent=boards.length;document.getElementById('stat-sent').textContent=waCount;}

let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

// INIT
addEntry();renderGroups();renderHistory();updateStats();
</script>
</body>
</html>
